<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJ snake game </title>
    <style>
        body {
            background-color: #2e3d52;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        canvas {
            background-color: #a3d16b; /* 换成好看的草地绿背景 */
            border: 6px solid #4a6722;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            max-width: 90vw;
            max-height: 50vh;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(2, 80px);
            gap: 10px;
            justify-content: center;
        }
        button {
            width: 80px;
            height: 80px;
            font-size: 32px;
            background-color: #5c7599;
            color: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px #3d516d;
        }
        button:active {
            background-color: #4c6282;
            box-shadow: 0 2px #3d516d;
            transform: translateY(2px);
        }
        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <h2>JJ snake game  🍎</h2>
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">
        <button class="up" onclick="changeDirection('UP')">▲</button>
        <button class="left" onclick="changeDirection('LEFT')">◀</button>
        <button class="down" onclick="changeDirection('DOWN')">▼</button>
        <button class="right" onclick="changeDirection('RIGHT')">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const box = 25; // 稍微放大一点方块，让卡通更好看
        let snake = [{ x: 8 * box, y: 8 * box }];
        let d = "RIGHT";

        let food = {
            x: Math.floor(Math.random() * 16) * box,
            y: Math.floor(Math.random() * 16) * box
        };

        function changeDirection(dir) {
            if (dir === "LEFT" && d !== "RIGHT") d = "LEFT";
            if (dir === "UP" && d !== "DOWN") d = "UP";
            if (dir === "RIGHT" && d !== "LEFT") d = "RIGHT";
            if (dir === "DOWN" && d !== "UP") d = "DOWN";
        }

        function draw() {
            // 1. 画出网格草地背景
            ctx.fillStyle = "#a3d16b";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 加点草地深浅交替的效果
            ctx.fillStyle = "#9cc964";
            for(let r=0; r<canvas.width/box; r++) {
                for(let c=0; c<canvas.height/box; c++) {
                    if((r+c)%2===0) ctx.fillRect(r*box, c*box, box, box);
                }
            }

            // 2. 画卡通蛇
            for (let i = 0; i < snake.length; i++) {
                ctx.font = box + "px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                if (i === 0) {
                    // 蛇头画个呆萌的青蛙或蛇头
                    ctx.fillText("🐸", snake[i].x + box/2, snake[i].y + box/2);
                } else {
                    // 蛇身画绿色小乌龟壳或者小圆圈
                    ctx.fillText("💚", snake[i].x + box/2, snake[i].y + box/2);
                }
            }

            // 3. 画卡通红苹果
            ctx.font = box + "px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🍓", food.x + box/2, food.y + box/2);

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d === "LEFT") snakeX -= box;
            if (d === "UP") snakeY -= box;
            if (d === "RIGHT") snakeX += box;
            if (d === "DOWN") snakeY += box;

            // 撞墙就死（游戏结束并重新开始）
            if (snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height) {
            alert("Game over");
            // 重新初始化蛇和位置
            snake = [{ x: 8 * box, y: 8 * box }];
            d = "RIGHT";
             return}

            let newHead = { x: snakeX, y: snakeY };

            if (snakeX === food.x && snakeY === food.y) {
                food = {
                    x: Math.floor(Math.random() * 16) * box,
                    y: Math.floor(Math.random() * 16) * box
                };
            } else {
                snake.pop();
            }

            snake.unshift(newHead);
        }

        setInterval(draw, 200); // 稍微减慢一点速度，玩起来更舒服
    </script>
</body>
</html>
